# nginx reverse proxy for New-RPCA-Cyber-Club.
# Copy to /etc/nginx/sites-available/rpca-cyber, edit server_name, then:
#   sudo ln -s /etc/nginx/sites-available/rpca-cyber /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d your-domain.com     # adds HTTPS automatically

server {
    listen 80;
    server_name your-domain.com;

    # Must be >= the app's 50 MB upload limit, or large uploads get 413.
    client_max_body_size 60M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
